spring.application.name=stone-chronicle
# 8080 が既に使われているときは、タスクマネージャーで java を終了するか、次のように変更する
# server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.username=springuser
spring.datasource.password=p@ss
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# public に既存オブジェクトがあり flyway_schema_history だけ無い場合にベースラインしてからマイグレーションする
spring.flyway.baseline-on-migrate=true
# デフォルトの baseline-version=1 だと V1__init が「既に適用済み」とみなされスキップされるため 0 にする
spring.flyway.baseline-version=0

mybatis.mapper-locations=classpath:mapper/AppUserMapper.xml,classpath:mapper/CardDefinitionMapper.xml,classpath:mapper/DeckEntryMapper.xml,classpath:mapper/DeckMapper.xml,classpath:mapper/UserCollectionMapper.xml,classpath:mapper/UserDailyMissionMapper.xml,classpath:mapper/UserWeeklyMissionMapper.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.stonechronicle.domain

spring.thymeleaf.cache=false

# 最終アクセスから N 日以上ログインなしのユーザーを削除（毎日実行。cron はサーバのデフォルトタイムゾーン）
app.inactive-user.retention-days=7
app.inactive-user.last-access-db-interval-minutes=15
app.inactive-user.cleanup-cron=0 0 4 * * *
