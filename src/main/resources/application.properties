spring.application.name=stone-chronicle

spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.username=springuser
spring.datasource.password=p@ss
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# public に既存オブジェクトがあり flyway_schema_history だけ無い場合にベースラインしてからマイグレーションする
spring.flyway.baseline-on-migrate=true

mybatis.mapper-locations=classpath:mapper/AppUserMapper.xml,classpath:mapper/CardDefinitionMapper.xml,classpath:mapper/DeckEntryMapper.xml,classpath:mapper/DeckMapper.xml,classpath:mapper/UserCollectionMapper.xml,classpath:mapper/UserDailyMissionMapper.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.stonechronicle.domain

spring.thymeleaf.cache=false
