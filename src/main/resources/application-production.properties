# VPS / PaaS: 割り当てポート（Render / Fly.io 等は PORT を渡す）
server.port=${PORT:8080}
# 外部から HTTP で届くようにすべてのインターフェースで待ち受け
server.address=0.0.0.0
spring.thymeleaf.cache=true

# /css, /js, /images 等の静的リソースに Cache-Control を付与（ブラウザ・CDN の再取得を減らす）
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.max-age=7d

# Nginx 等で TLS 終端するとき、スキーム判定に X-Forwarded-* を使う
server.forward-headers-strategy=framework
