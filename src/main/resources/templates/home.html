<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>ナインユニバース — ホーム</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">ナインユニバース</h1>
	<div class="topbar__meta">
		<span>ジェム: <strong th:text="${user.coins}">0</strong></span>
		<form th:action="@{/logout}" method="post" class="inline">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn--ghost">ゲームをやめる（ログアウト）</button>
		</form>
	</div>
</header>

<div id="welcome-bonus-modal"
     class="welcome-bonus-modal"
     th:if="${welcomeHomeBonusShown}"
     role="dialog"
     aria-modal="true"
     aria-labelledby="welcome-bonus-title">
	<div class="welcome-bonus-modal__panel">
		<h2 id="welcome-bonus-title" class="welcome-bonus-modal__heading">新規ユーザープレゼント！</h2>
		<p class="welcome-bonus-modal__text"
		   th:text="|${welcomeHomeBonusAmount}ジェムを付与しました。|">30ジェムを付与しました。</p>
		<button type="button" class="btn btn--primary welcome-bonus-modal__close" id="welcome-bonus-close">閉じる</button>
	</div>
</div>

<main class="home-grid">
	<a class="tile" th:href="@{/pack}">
		<span class="tile__label">カードパックを購入</span>
		<span class="tile__hint">3〜5ジェム / 4枚</span>
	</a>
	<a class="tile" th:href="@{/battle/cpu}">
		<span class="tile__label">CPUとバトル</span>
	</a>
	<a class="tile" th:href="@{/battle/pvp}">
		<span class="tile__label">他のプレイヤーとバトル</span>
	</a>
	<a class="tile" th:href="@{/decks}">
		<span class="tile__label">デッキを作成</span>
	</a>
	<a class="tile" th:href="@{/library}">
		<span class="tile__label">ライブラリを見る</span>
	</a>
	<a class="tile" th:href="@{/missions}">
		<span class="tile__label">ミッション</span>
	</a>
</main>

<section class="panel" th:if="${missions != null && !missions.isEmpty()}">
	<h2>今日のミッション</h2>
	<ul class="mission-mini">
		<li th:each="m : ${missions}">
			<span th:text="${m.title}">—</span>
			— <span th:text="${m.progress}">0</span> / <span th:text="${m.targetCount}">0</span>
			<span th:if="${m.rewardGranted}" class="ok">（報酬受取済）</span>
		</li>
	</ul>
</section>

<section class="panel" th:if="${weeklyMissions != null && !weeklyMissions.isEmpty()}">
	<h2>今週のミッション</h2>
	<p class="muted home-weekly-mission__hint">月曜更新・各6ジェム</p>
	<ul class="mission-mini">
		<li th:each="w : ${weeklyMissions}">
			<span th:text="${w.title}">—</span>
			— <span th:text="${w.progress}">0</span> / <span th:text="${w.targetCount}">0</span>
			<span th:if="${w.rewardGranted}" class="ok">（報酬受取済）</span>
		</li>
	</ul>
</section>
<script th:if="${welcomeHomeBonusShown}">
(function () {
	var modal = document.getElementById('welcome-bonus-modal');
	var btn = document.getElementById('welcome-bonus-close');
	if (!modal || !btn) return;
	document.body.style.overflow = 'hidden';
	btn.focus();
	btn.addEventListener('click', function () {
		modal.hidden = true;
		document.body.style.overflow = '';
	});
})();
</script>
</body>
</html>
