<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>ストーンズクロニクル — ホーム</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">ストーンズクロニクル</h1>
	<div class="topbar__meta">
		<span>コイン: <strong th:text="${user.coins}">0</strong></span>
		<form th:action="@{/logout}" method="post" class="inline">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn--ghost">ゲームをやめる（ログアウト）</button>
		</form>
	</div>
</header>

<main class="home-grid">
	<a class="tile" th:href="@{/pack}">
		<span class="tile__label">カードパックを引く</span>
		<span class="tile__hint">3コイン / 4枚</span>
	</a>
	<a class="tile" th:href="@{/battle/cpu}">
		<span class="tile__label">CPUとバトル</span>
	</a>
	<a class="tile" th:href="@{/battle/pvp}">
		<span class="tile__label">他のプレイヤーとバトル</span>
	</a>
	<a class="tile" th:href="@{/decks}">
		<span class="tile__label">デッキを作成</span>
	</a>
	<a class="tile" th:href="@{/library}">
		<span class="tile__label">ライブラリを見る</span>
	</a>
	<a class="tile" th:href="@{/missions}">
		<span class="tile__label">ミッション</span>
	</a>
</main>

<section class="panel" th:if="${missions != null && !missions.isEmpty()}">
	<h2>今日のミッション</h2>
	<ul class="mission-mini">
		<li th:each="m : ${missions}">
			<span th:text="${m.title}">—</span>
			— <span th:text="${m.progress}">0</span> / <span th:text="${m.targetCount}">0</span>
			<span th:if="${m.rewardGranted}" class="ok">（報酬受取済）</span>
		</li>
	</ul>
</section>
</body>
</html>
