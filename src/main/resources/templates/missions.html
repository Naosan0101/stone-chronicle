<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>ミッション — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">ミッション</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>

<ul class="mission-list">
	<li class="panel" th:each="m : ${missions}">
		<h2 th:text="${m.title}">タイトル</h2>
		<p>進捗: <span th:text="${m.progress}">0</span> / <span th:text="${m.targetCount}">0</span></p>
		<p class="muted">達成で3コイン（自動付与）</p>
		<p class="ok" th:if="${m.rewardGranted}">報酬受取済</p>
	</li>
</ul>
</body>
</html>
