<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>デッキ — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">デッキ作成</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>

<p class="ok" th:if="${msg}" th:text="${msg}"></p>
<p class="error" th:if="${error}" th:text="${error}"></p>

<p><a class="btn btn--primary" th:href="@{/decks/new}">新規作成</a></p>

<ul class="deck-names" th:if="${decks != null && !decks.isEmpty()}">
	<li th:each="d : ${decks}" class="panel deck-row">
		<span class="deck-row__name" th:text="${d.name}">名前</span>
		<div class="deck-row__actions">
			<a class="btn" th:href="@{/decks/{id}/edit(id=${d.id})}">編集</a>
			<form th:action="@{/decks/{id}/delete(id=${d.id})}" method="post" class="inline"
			      onsubmit="return confirm('本当にいいですか？');">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<button type="submit" class="btn btn--danger">削除</button>
			</form>
		</div>
	</li>
</ul>

<p th:if="${decks == null || decks.isEmpty()}" class="muted">デッキがありません。新規作成してください。</p>
</body>
</html>
