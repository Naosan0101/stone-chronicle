<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  画像のみ: ①カード基盤 → ②種族バー → ③カード基礎データ（最前面）→ HTML テキスト
  イラスト層は後日。素材: static/images/cards/*.PNG
-->
<div th:fragment="layers(c, cp)" class="card-face card-face--layered"
     th:classappend="|card-face--attr-${c.attribute} card-face--rarity-${c.rarity}|">
	<div class="card-face__stack" aria-hidden="true">
		<img class="card-face__layer-img card-face__layer-img--base"
		     th:if="${c.layerBasePath != null && !c.layerBasePath.isBlank()}"
		     th:src="|${cp != null ? cp : ''}${c.layerBasePath}|"
		     alt=""
		     onerror="this.hidden=true; this.removeAttribute('src');"/>
		<img class="card-face__layer-img card-face__layer-img--portrait"
		     th:if="${c.layerPortraitPath != null && !c.layerPortraitPath.isBlank()}"
		     th:src="|${cp != null ? cp : ''}${c.layerPortraitPath}|"
		     alt=""
		     onerror="this.hidden=true; this.removeAttribute('src');"/>
		<img class="card-face__layer-img card-face__layer-img--bar"
		     th:if="${c.barImagePath != null && !c.barImagePath.isBlank()}"
		     th:src="|${cp != null ? cp : ''}${c.barImagePath}|"
		     alt=""
		     onerror="this.hidden=true; this.removeAttribute('src');"/>
		<img class="card-face__layer-img card-face__layer-img--frame"
		     th:if="${c.layerFramePath != null && !c.layerFramePath.isBlank()}"
		     th:src="|${cp != null ? cp : ''}${c.layerFramePath}|"
		     alt=""
		     fetchpriority="high"
		     onerror="this.hidden=true; this.removeAttribute('src');"/>
	</div>
	<div class="card-face__layer card-face__datum">
		<span th:class="${c.costFaceCssClass}" th:text="${c.cost}">0</span>
		<span th:class="${c.powerFaceCssClass}" th:text="${c.basePower}">0</span>
		<span class="card-face__name" th:text="${c.name}">名前</span>
		<span class="card-face__attr-label"
		      th:classappend="${c.attributeLabelLines != null && c.attributeLabelLines.size() > 1} ? ' card-face__attr-label--compound'">
			<th:block th:each="line : ${c.attributeLabelLines}">
				<span class="card-face__attr-line" th:text="${line}">種族</span>
			</th:block>
		</span>
		<span class="card-face__rarity" th:text="${c.rarityLabel != null ? c.rarityLabel : 'C'}">C</span>
	</div>
	<div class="card-face__layer card-face__narrative">
		<div class="card-face__ability">
			<th:block th:each="block : ${c.abilityBlocks}">
				<p th:if="${block.headline != null && !block.headline.isEmpty()}"
				   class="card-face__ability-head"
				   th:text="${block.headline}">〈配置〉</p>
				<p class="card-face__ability-body"
				   th:text="${block.body}">本文</p>
			</th:block>
		</div>
	</div>
	<div class="card-spark" aria-hidden="true"></div>
</div>
</body>
</html>
