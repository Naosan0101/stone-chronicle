<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="cell(c)" class="library-card" th:classappend="${!c.owned} ? 'library-card--locked'">
	<button type="button" class="library-card__open"
			th:disabled="${!c.owned}"
			th:data-name="${c.name}"
			th:data-image="${c.imagePath}"
			th:data-attribute="${c.attribute}"
			th:data-cost="${c.cost}"
			th:data-base-power="${c.basePower}"
			th:data-owned="${c.owned}"
			th:data-quantity="${c.quantity}"
			th:data-ability="${c.libraryAbilityText != null ? c.libraryAbilityText : ''}">
		<div class="library-card__inner">
			<img th:src="${c.imagePath}" th:alt="${c.owned ? c.name : ''}"/>
			<div class="library-card__mask" th:if="${!c.owned}"></div>
		</div>
		<div class="library-card__cap">
			<span th:text="${c.name}">名前</span>
			<span th:if="${c.owned}" th:text="|×${c.quantity}|">×0</span>
			<span th:if="${!c.owned}" class="muted">未所持</span>
		</div>
	</button>
</div>
</body>
</html>
