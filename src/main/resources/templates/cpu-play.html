<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>バトル — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page page--battle">
<header class="topbar">
	<h1 class="game-title">バトル</h1>
	<form th:action="@{/battle/cpu/surrender}" method="post" class="inline">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit" class="btn btn--danger">降参</button>
	</form>
</header>

<p class="battle-msg" th:text="${state.lastMessage}">—</p>

<section class="battle-row battle-row--opp">
	<div class="battle-cell">
		<h3>相手の手札</h3>
		<div class="hand backs">
			<th:block th:if="${state.cpuHand != null && !state.cpuHand.isEmpty()}">
				<img th:each="i : ${#numbers.sequence(1, state.cpuHand.size())}" th:src="${cardBack}" alt="裏"/>
			</th:block>
		</div>
	</div>
	<div class="battle-cell">
		<h3>相手ストーン</h3>
		<p class="stone-count" th:text="${state.cpuStones}">0</p>
	</div>
</section>

<section class="battle-row battle-row--mid">
	<div class="battle-cell">
		<h3>相手デッキ</h3>
		<div class="deck-stack" th:text="|${state.cpuDeck.size()}枚|">0枚</div>
	</div>
	<div class="battle-cell">
		<h3>相手バトルゾーン</h3>
		<div class="zone" th:if="${state.cpuBattle != null && cpuBattleDef != null}">
			<img th:src="@{/images/cards/{fn}(fn=${cpuBattleDef.imageFile})}" th:alt="${cpuBattleDef.name}"/>
		</div>
		<p class="muted" th:if="${state.cpuBattle == null}">なし</p>
	</div>
	<div class="battle-cell">
		<h3>相手レスト</h3>
		<p th:text="|${state.cpuRest.size()}枚|">0枚</p>
	</div>
</section>

<section class="battle-row battle-row--mid">
	<div class="battle-cell">
		<h3>自分レスト</h3>
		<p th:text="|${state.humanRest.size()}枚|">0枚</p>
	</div>
	<div class="battle-cell">
		<h3>自分バトルゾーン</h3>
		<div class="zone" th:if="${state.humanBattle != null && humanBattleDef != null}">
			<img th:src="@{/images/cards/{fn}(fn=${humanBattleDef.imageFile})}" th:alt="${humanBattleDef.name}"/>
		</div>
		<p class="muted" th:if="${state.humanBattle == null}">なし</p>
	</div>
	<div class="battle-cell">
		<h3>自分デッキ</h3>
		<div class="deck-stack" th:text="|${state.humanDeck.size()}枚|">0枚</div>
	</div>
</section>

<section class="battle-row battle-row--you">
	<div class="battle-cell">
		<h3>自分ストーン</h3>
		<p class="stone-count" th:text="${state.humanStones}">0</p>
	</div>
	<div class="battle-cell battle-cell--wide">
		<h3>自分の手札（左が新しく引いたカード）</h3>
		<div class="hand">
			<div class="hand-card" th:each="c,iter : ${state.humanHand}" th:with="d=${defs.get(c.cardId)}">
				<span class="hand-idx" th:text="${iter.index}">0</span>
				<img th:if="${d != null}" th:src="@{/images/cards/{fn}(fn=${d.imageFile})}" th:alt="${d.name}"/>
			</div>
		</div>
	</div>
</section>

<section class="panel" th:if="${state.humansTurn}">
	<h2>あなたのターン</h2>
	<p class="muted">手札インデックスは左から0。レベルアップ後の手札で指定してください。</p>
	<form th:action="@{/battle/cpu/act}" method="post" class="stack">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<label>手札の一番右からレストへ捨てる枚数（レベルアップ）
			<input type="number" name="levelUpRest" min="0" max="4" value="0"/>
		</label>
		<label>ストーンで強化する回数（1回+2、ストーン1消費）
			<input type="number" name="levelUpStones" min="0" max="10" value="0"/>
		</label>
		<label>
			<input type="checkbox" name="deploy" value="true"/>
			ファイターを配置する
		</label>
		<label>配置する手札のインデックス（左=0）
			<input type="number" name="deployIndex" min="0" max="7" value="0"/>
		</label>
		<button type="submit" class="btn btn--primary">ターン実行</button>
	</form>
</section>

<ul class="log panel" th:if="${state.eventLog != null && !state.eventLog.isEmpty()}">
	<li th:each="line : ${state.eventLog}" th:text="${line}">log</li>
</ul>
</body>
</html>
