<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>バトル — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<meta name="card_back" th:content="${cardBack}"/>
</head>
<body class="page page--battle">
<header class="topbar">
	<h1 class="game-title">バトル</h1>
	<form th:action="@{/battle/cpu/surrender}" method="post" class="inline">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit" class="btn btn--danger">降参</button>
	</form>
</header>

<div id="battle-app">
	<p class="muted">読み込み中…</p>
</div>

<noscript>
	<p class="panel error">この画面は JavaScript が必要です。</p>
</noscript>

<script th:src="@{/js/battle-ui.js}"></script>
</body>
</html>
