<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>バトル — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<meta name="card_back" th:content="${cardBack}"/>
	<meta name="stone_context_path" th:content="${contextPath != null ? contextPath : ''}"/>
	<meta name="card_plate_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardPlateUrl}|"/>
	<meta name="card_data_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardDataUrl}|"/>
</head>
<body class="page page--battle">
<header class="topbar topbar--battle">
	<h1 class="game-title">バトル</h1>
	<div class="topbar__actions">
		<form th:action="@{/battle/cpu/surrender}" method="post" class="inline">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn--danger">降参</button>
		</form>
		<button type="button" class="btn btn--ghost" id="battle-log-open" aria-haspopup="dialog" aria-controls="battle-log-modal">ログ</button>
	</div>
</header>

<div id="battle-app">
	<p class="muted">読み込み中…</p>
</div>

<div id="battle-log-modal" class="battle-log-modal" hidden role="dialog" aria-modal="true" aria-labelledby="battle-log-title">
	<div class="battle-log-modal__panel">
		<button type="button" class="battle-log-modal__close" id="battle-log-close" aria-label="閉じる">×</button>
		<h2 id="battle-log-title" class="battle-log-modal__title">バトルログ</h2>
		<ul id="battle-log-list" class="battle-log-modal__list"></ul>
	</div>
</div>

<div id="battle-card-tooltip" class="deck-tooltip library-page-tooltip" hidden role="tooltip">
	<div class="deck-tooltip__inner">
		<p class="deck-tooltip__name battle-card-tooltip__name"></p>
		<dl class="deck-tooltip__stats">
			<div><dt>種族</dt><dd class="battle-card-tooltip__attr"></dd></div>
		</dl>
		<p class="deck-tooltip__label">効果</p>
		<p class="deck-tooltip__ability battle-card-tooltip__ability"></p>
	</div>
</div>

<noscript>
	<p class="panel error">この画面は JavaScript が必要です。</p>
</noscript>

<script th:src="@{/js/card-spark.js}"></script>
<script th:src="@{/js/card-face-layer.js}"></script>
<script th:src="@{/js/battle-ui.js}"></script>
</body>
</html>
