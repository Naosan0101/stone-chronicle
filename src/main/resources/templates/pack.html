<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>カードパック — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">カードパック</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>

<p>所持コイン: <strong th:text="${coins}">0</strong></p>
<p class="error" th:if="${error}" th:text="${error}"></p>

<div class="pack-stage">
	<form th:action="@{/pack/open}" method="post" class="inline">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit" class="btn btn--primary pack-open-btn">パックを開ける（3コイン）</button>
	</form>
	<img class="pack-art" th:src="${packImage}" alt="カードパック"/>
</div>

<div class="pull-grid" th:if="${pulled != null}">
	<h2>獲得カード</h2>
	<div class="card-strip">
		<button type="button" class="card-thumb" th:each="c : ${pulled}"
		        th:onclick="|document.getElementById('big').src=this.querySelector('img').src|">
			<img th:src="@{/images/cards/{fn}(fn=${c.imageFile})}" th:alt="${c.name}"/>
		</button>
	</div>
	<img id="big" class="card-big" alt="" th:if="${!pulled.isEmpty()}"
	     th:src="@{/images/cards/{fn}(fn=${pulled[0].imageFile})}"/>
</div>

<script th:inline="javascript">
	document.querySelectorAll('.card-thumb img').forEach(function (img) {
		img.addEventListener('click', function (e) { e.preventDefault(); });
	});
</script>
</body>
</html>
