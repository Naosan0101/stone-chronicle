<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>デッキ編集 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
	<meta name="stone_context_path" th:content="${contextPath != null ? contextPath : ''}"/>
	<meta name="card_plate_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardPlateUrl}|"/>
	<meta name="card_data_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardDataUrl}|"/>
</head>
<body class="page page--deck">
<header class="topbar">
	<h1 class="game-title" th:text="${editDeckId == null} ? 'デッキ新規' : 'デッキ編集'">デッキ</h1>
	<a class="btn btn--ghost" th:href="@{/decks}">デッキ一覧</a>
</header>

<p class="error" th:if="${error}" th:text="${error}"></p>
<p class="panel deck-hint error" th:if="${editDeckId == null && noOwnedCards}">
	まだカードを1枚も持っていません。ホームの
	<a th:href="@{/pack}">カードパックを購入</a>
	でカードを入手してから、もう一度この画面を開いてください。
</p>
<p class="panel deck-hint error" th:if="${editDeckId == null && insufficientCardsForDeck}">
	同じカードはデッキに最大2枚までです。いまのコレクションでは
	<strong th:text="${maxBuildableSlots}">0</strong>
	枚までしか入れられず、8枚そろいません。
	<a th:href="@{/pack}">カードパックを購入</a>
	で枚数を増やしてください。
</p>

<form id="deck-form" th:action="@{/decks/save}" method="post" class="deck-form">
	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
	<input type="hidden" name="editDeckId" th:if="${editDeckId != null}" th:value="${editDeckId}"/>
	<input type="hidden" id="cardIds" name="cardIds" value=""/>

	<label class="deck-name-field">デッキ名
		<input type="text" name="name" th:value="${deckName}" required/>
	</label>

	<div class="deck-panels deck-panels--stack">
		<section class="panel deck-panel deck-panel--slots">
			<h2>デッキ（8枚・クリックで詳細・ダブルクリックで戻す）</h2>
			<div id="deck-zone" class="card-pool card-pool--deck" data-max="8"></div>
			<p id="deck-count" class="muted">0 / 8</p>
			<div class="deck-panel__actions-row">
				<button type="submit" id="complete-btn" class="btn btn--primary" style="display:none">完了</button>
				<button type="button" id="deck-clear-all-btn" class="btn btn--ghost deck-panel__clear-deck-btn"
						disabled
						aria-label="デッキに入っているカードをすべてライブラリに戻す">すべてライブラリに戻す</button>
			</div>
		</section>
		<section class="panel deck-panel deck-panel--library">
			<div class="deck-lib-toolbar">
				<h2 class="deck-lib-toolbar__title">ライブラリ（クリックで詳細・ダブルクリックでデッキへ）</h2>
				<div class="deck-lib-toolbar__controls">
					<label class="deck-lib-field">検索
						<input type="search" id="lib-search" class="deck-lib-input" autocomplete="off" placeholder="カード名・効果の一部"/>
					</label>
					<label class="deck-lib-field">種族
						<select id="lib-filter-attr" class="deck-lib-select">
							<option value="" selected>すべて</option>
							<option value="HUMAN">人間</option>
							<option value="ELF">エルフ</option>
							<option value="UNDEAD">アンデッド</option>
							<option value="DRAGON">ドラゴン</option>
						</select>
					</label>
					<label class="deck-lib-field">強さ
						<select id="lib-filter-power" class="deck-lib-select">
							<option value="" selected>すべて</option>
							<option value="0">0</option>
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
							<option value="5">5</option>
							<option value="6">6</option>
						</select>
					</label>
					<label class="deck-lib-field">コスト
						<select id="lib-filter-cost" class="deck-lib-select">
							<option value="" selected>すべて</option>
							<option value="0">0</option>
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
						</select>
					</label>
					<label class="deck-lib-field">★
						<select id="lib-filter-rarity" class="deck-lib-select">
							<option value="" selected>すべて</option>
							<option value="Reg">レジェンダリー</option>
							<option value="Ep">エピック</option>
							<option value="R">レア</option>
							<option value="C">コモン</option>
						</select>
					</label>
					<label class="deck-lib-field">並び替え（コスト）
						<select id="lib-sort" class="deck-lib-select">
							<option value="cost_asc" selected>コスト 小→大</option>
							<option value="cost_desc">コスト 大→小</option>
						</select>
					</label>
				</div>
			</div>
			<div id="lib-zone" class="card-pool library-pool"></div>
		</section>
	</div>

	<p><a class="btn btn--ghost" th:href="@{/decks}">やっぱやめる</a></p>
</form>

<div id="lib-seed" style="display:none">
	<div th:each="c : ${library}" class="seed"
	     th:data-id="${c.id}"
	     th:data-img="${c.imagePath}"
	     th:data-layer-base="${c.layerBasePath}"
	     th:data-layer-portrait="${c.layerPortraitPath}"
	     th:data-layer-bar="${c.barImagePath}"
	     th:data-layer-frame="${c.layerFramePath}"
	     th:data-rarity="${c.rarity}"
	     th:data-rarity-label="${c.rarityLabel}"
	     th:data-qty="${c.quantity}"
	     th:data-name="${c.name}"
	     th:data-attribute="${c.attribute}"
	     th:data-attribute-label="${c.attributeLabelJa}"
	     th:data-power="${c.basePower}"
	     th:data-cost="${c.cost}"
	     th:data-ability="${c.libraryAbilityText != null ? c.libraryAbilityText : ''}"
	     th:data-canonical-line="${c.canonicalAbilityLine != null ? c.canonicalAbilityLine : ''}"
	     th:data-deploy-help="${c.deployHelp != null ? c.deployHelp : ''}"
	     th:data-passive-help="${c.passiveHelp != null ? c.passiveHelp : ''}"
	     th:data-attr-pipe="${c.attributeLabelPipe != null ? c.attributeLabelPipe : ''}"></div>
</div>
<div id="selected-seed" style="display:none">
	<span th:each="sid : ${selectedIds}" th:text="${sid}"></span>
</div>

<div id="deck-tooltip" class="deck-tooltip deck-edit-page-tooltip" hidden role="tooltip">
	<div class="deck-tooltip__inner">
		<p class="deck-tooltip__name"></p>
		<dl class="deck-tooltip__stats">
			<div><dt>種族</dt><dd class="deck-tooltip__attr"></dd></div>
			<div><dt>コスト</dt><dd class="deck-tooltip__cost"></dd></div>
			<div><dt>強さ</dt><dd class="deck-tooltip__power"></dd></div>
		</dl>
		<p class="deck-tooltip__label">効果</p>
		<p class="deck-tooltip__ability"></p>
	</div>
</div>

<div id="library-detail-modal" class="library-detail-modal" hidden>
	<div class="library-detail-modal__panel" role="dialog" aria-modal="true" aria-label="カード詳細">
		<button type="button" class="library-detail-modal__close" data-library-detail-close aria-label="閉じる">×</button>
		<div id="library-detail-art" class="library-detail-modal__art-wrap">
			<div class="card-face card-face--layered" id="library-modal-card-face">
				<div class="card-face__stack" aria-hidden="true">
					<img id="lib-modal-layer-base" class="card-face__layer-img card-face__layer-img--base" th:src="|${contextPath != null ? contextPath : ''}${cardPlateUrl}|" alt="" onerror="this.hidden=true; this.removeAttribute('src');"/>
<!--					<img id="lib-modal-layer-portrait" class="card-face__layer-img card-face__layer-img--portrait" alt="" hidden/>-->
					<img id="lib-modal-layer-bar" class="card-face__layer-img card-face__layer-img--bar" alt="" hidden/>
					<img id="lib-modal-layer-frame" class="card-face__layer-img card-face__layer-img--frame" th:src="|${contextPath != null ? contextPath : ''}${cardDataUrl}|" alt="" fetchpriority="high" onerror="this.hidden=true; this.removeAttribute('src');"/>
				</div>
				<div class="card-face__layer card-face__datum">
					<span id="lib-modal-cost" class="card-face__cost"></span>
					<span id="lib-modal-power" class="card-face__power"></span>
					<span id="lib-modal-name" class="card-face__name"></span>
					<span id="lib-modal-attr" class="card-face__attr-label"></span>
					<span id="lib-modal-rarity" class="card-face__rarity"></span>
				</div>
				<div class="card-face__layer card-face__narrative">
					<div id="lib-modal-ability" class="card-face__ability"></div>
				</div>
				<div id="lib-modal-spark" class="card-spark" hidden aria-hidden="true"></div>
			</div>
		</div>
	</div>
</div>

<script th:src="@{/js/card-spark.js}"></script>
<script th:src="@{/js/card-face-layer.js}"></script>
<script th:src="@{/js/deck-edit.js}"></script>
</body>
</html>
