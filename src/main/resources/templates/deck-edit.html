<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>デッキ編集 — ストーンズクロニクル</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page page--deck">
<header class="topbar">
	<h1 class="game-title" th:text="${editDeckId == null} ? 'デッキ新規' : 'デッキ編集'">デッキ</h1>
	<a class="btn btn--ghost" th:href="@{/decks}">デッキ一覧</a>
</header>

<p class="error" th:if="${error}" th:text="${error}"></p>
<p class="panel deck-hint error" th:if="${editDeckId == null && noOwnedCards}">
	まだカードを1枚も持っていません。ホームの
	<a th:href="@{/pack}">カードパックを引く</a>
	でカードを入手してから、もう一度この画面を開いてください。
</p>
<p class="panel deck-hint error" th:if="${editDeckId == null && insufficientCardsForDeck}">
	同じカードはデッキに最大2枚までです。いまのコレクションでは
	<strong th:text="${maxBuildableSlots}">0</strong>
	枚までしか入れられず、8枚そろいません。
	<a th:href="@{/pack}">カードパックを引く</a>
	で枚数を増やしてください。
</p>

<form id="deck-form" th:action="@{/decks/save}" method="post" class="deck-form">
	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
	<input type="hidden" name="editDeckId" th:if="${editDeckId != null}" th:value="${editDeckId}"/>
	<input type="hidden" id="cardIds" name="cardIds" value=""/>

	<label class="deck-name-field">デッキ名
		<input type="text" name="name" th:value="${deckName}" required/>
	</label>

	<div class="deck-panels deck-panels--stack">
		<section class="panel deck-panel deck-panel--slots">
			<h2>デッキ（8枚・左クリックで戻す）</h2>
			<div id="deck-zone" class="card-pool card-pool--deck" data-max="8"></div>
			<p id="deck-count" class="muted">0 / 8</p>
			<button type="submit" id="complete-btn" class="btn btn--primary" style="display:none">完了</button>
		</section>
		<section class="panel deck-panel deck-panel--library">
			<div class="deck-lib-toolbar">
				<h2 class="deck-lib-toolbar__title">ライブラリ（左クリックでデッキへ）</h2>
				<div class="deck-lib-toolbar__controls">
					<label class="deck-lib-field">名前検索
						<input type="search" id="lib-search" class="deck-lib-input" autocomplete="off" placeholder="カード名の一部"/>
					</label>
					<label class="deck-lib-field">並び替え
						<select id="lib-sort" class="deck-lib-select">
							<option value="attr_power_asc" selected>種族 → 強さ（小→大）</option>
							<option value="attr_power_desc">種族 → 強さ（大→小）</option>
							<option value="power_attr_asc">強さ（小→大）→ 種族</option>
							<option value="power_attr_desc">強さ（大→小）→ 種族</option>
						</select>
					</label>
				</div>
			</div>
			<div id="lib-zone" class="card-pool library-pool"></div>
		</section>
	</div>

	<p><a class="btn btn--ghost" th:href="@{/decks}">やっぱやめる</a></p>
</form>

<div id="lib-seed" style="display:none">
	<div th:each="c : ${library}" class="seed"
	     th:data-id="${c.id}"
	     th:data-img="${c.imagePath}"
	     th:data-qty="${c.quantity}"
	     th:data-name="${c.name}"
	     th:data-attribute="${c.attribute}"
	     th:data-power="${c.basePower}"></div>
</div>
<div id="selected-seed" style="display:none">
	<span th:each="sid : ${selectedIds}" th:text="${sid}"></span>
</div>

<div id="preview" class="modal" hidden>
	<div class="modal__box">
		<button type="button" class="modal__close" onclick="document.getElementById('preview').hidden=true">×</button>
		<img id="preview-img" alt=""/>
	</div>
</div>

<script th:src="@{/js/deck-edit.js}"></script>
</body>
</html>
