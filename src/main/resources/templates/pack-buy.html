<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>カードパック購入 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page page--pack">
<header class="topbar">
	<h1 class="game-title">カードパックを購入</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>

<p>所持ジェム: <strong th:text="${gems}">0</strong></p>
<p class="error" th:if="${error}" th:text="${error}"></p>

<section class="pack-buy">
	<div class="pack-buy__grid">
		<div class="pack-buy__cell">
			<button type="button" class="pack-buy__item" data-pack-type="STANDARD" data-pack-name="スタンダードパック" data-pack-cost="3">
				<img class="pack-buy__img" th:src="|${contextPath != null ? contextPath : ''}${standardPackImage}?v=${packArtCacheKey}|" alt="スタンダードパック"/>
				<span class="pack-buy__label">スタンダードパック（3ジェム）</span>
			</button>
			<button type="button" class="btn btn--ghost pack-buy__detail" data-open-pack-detail="pack-detail-standard">詳細を見る</button>
		</div>
		<div class="pack-buy__cell">
			<button type="button" class="pack-buy__item" data-pack-type="WINDY_HILL" data-pack-name="風吹く丘パック" data-pack-cost="4">
				<img class="pack-buy__img" th:src="|${contextPath != null ? contextPath : ''}${windyHillPackImage}?v=${packArtCacheKey}|" alt="風吹く丘パック"/>
				<span class="pack-buy__label">風吹く丘パック（4ジェム）</span>
			</button>
			<button type="button" class="btn btn--ghost pack-buy__detail" data-open-pack-detail="pack-detail-windy-hill">詳細を見る</button>
		</div>
		<div class="pack-buy__cell">
			<button type="button" class="pack-buy__item" data-pack-type="EVIL_THREAT" data-pack-name="邪悪なる脅威パック" data-pack-cost="5">
				<img class="pack-buy__img" th:src="|${contextPath != null ? contextPath : ''}${evilThreatPackImage}?v=${packArtCacheKey}|" alt="邪悪なる脅威パック"/>
				<span class="pack-buy__label">邪悪なる脅威パック（5ジェム）</span>
			</button>
			<button type="button" class="btn btn--ghost pack-buy__detail" data-open-pack-detail="pack-detail-evil-threat">詳細を見る</button>
		</div>
	</div>
</section>

<section id="pack-buy-confirm-bar" class="pack-buy-confirm" hidden>
	<div class="pack-buy-confirm__inner">
		<p class="pack-buy-confirm__title" id="pack-buy-confirm-title">パックを選択してください</p>
		<div class="pack-buy-confirm__actions">
			<form th:action="@{/pack/buy}" method="post" class="inline">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<input type="hidden" name="type" id="pack-buy-type" value=""/>
				<button type="submit" class="btn btn--primary" id="pack-buy-confirm" disabled>購入</button>
			</form>
			<button type="button" class="btn btn--ghost" id="pack-buy-cancel" disabled>キャンセル</button>
		</div>
	</div>
</section>

<!-- スタンダード -->
<div id="pack-detail-standard" class="pack-detail-modal" hidden>
	<div class="pack-detail-modal__backdrop" data-pack-detail-close tabindex="-1" aria-hidden="true"></div>
	<div class="pack-detail-modal__panel" role="dialog" aria-modal="true" aria-labelledby="pack-detail-standard-title">
		<button type="button" class="pack-detail-modal__close" data-pack-detail-close aria-label="閉じる">×</button>
		<h2 id="pack-detail-standard-title" class="pack-detail-modal__heading">スタンダードパック</h2>
		<h3 class="pack-detail-modal__sub">レア度別の排出率</h3>
		<ul class="pack-detail-modal__rates">
			<li th:each="r : ${packRarityRates}">
				<span class="pack-detail-modal__rate-label" th:text="${r.label}">レジェンダリー</span>
				<span class="pack-detail-modal__rate-pct" th:text="${r.percent}">3%</span>
			</li>
		</ul>
		<h3 class="pack-detail-modal__sub">このパックから排出されるカード</h3>
		<ul class="pack-detail-modal__cards">
			<li th:each="line : ${standardPackPreview}"
			    class="pack-detail-modal__card-row"
			    th:classappend="${'pack-detail-modal__card-row--' + line.rarityCode}">
				<span class="pack-detail-modal__card-name" th:text="${line.name}">名前</span>
				<span class="pack-detail-modal__card-rarity" th:text="${line.rarityLabel}">コモン</span>
			</li>
		</ul>
	</div>
</div>

<!-- 風吹く丘 -->
<div id="pack-detail-windy-hill" class="pack-detail-modal" hidden>
	<div class="pack-detail-modal__backdrop" data-pack-detail-close tabindex="-1" aria-hidden="true"></div>
	<div class="pack-detail-modal__panel" role="dialog" aria-modal="true" aria-labelledby="pack-detail-windy-title">
		<button type="button" class="pack-detail-modal__close" data-pack-detail-close aria-label="閉じる">×</button>
		<h2 id="pack-detail-windy-title" class="pack-detail-modal__heading">風吹く丘パック</h2>
		<h3 class="pack-detail-modal__sub">レア度別の排出率</h3>
		<ul class="pack-detail-modal__rates">
			<li th:each="r : ${packRarityRates}">
				<span class="pack-detail-modal__rate-label" th:text="${r.label}">レジェンダリー</span>
				<span class="pack-detail-modal__rate-pct" th:text="${r.percent}">3%</span>
			</li>
		</ul>
		<h3 class="pack-detail-modal__sub">このパックから排出されるカード</h3>
		<ul class="pack-detail-modal__cards">
			<li th:each="line : ${windyHillPackPreview}"
			    class="pack-detail-modal__card-row"
			    th:classappend="${'pack-detail-modal__card-row--' + line.rarityCode}">
				<span class="pack-detail-modal__card-name" th:text="${line.name}">名前</span>
				<span class="pack-detail-modal__card-rarity" th:text="${line.rarityLabel}">コモン</span>
			</li>
		</ul>
	</div>
</div>

<!-- 邪悪なる脅威 -->
<div id="pack-detail-evil-threat" class="pack-detail-modal" hidden>
	<div class="pack-detail-modal__backdrop" data-pack-detail-close tabindex="-1" aria-hidden="true"></div>
	<div class="pack-detail-modal__panel" role="dialog" aria-modal="true" aria-labelledby="pack-detail-evil-title">
		<button type="button" class="pack-detail-modal__close" data-pack-detail-close aria-label="閉じる">×</button>
		<h2 id="pack-detail-evil-title" class="pack-detail-modal__heading">邪悪なる脅威パック</h2>
		<h3 class="pack-detail-modal__sub">レア度別の排出率</h3>
		<ul class="pack-detail-modal__rates">
			<li th:each="r : ${packRarityRates}">
				<span class="pack-detail-modal__rate-label" th:text="${r.label}">レジェンダリー</span>
				<span class="pack-detail-modal__rate-pct" th:text="${r.percent}">3%</span>
			</li>
		</ul>
		<h3 class="pack-detail-modal__sub">このパックから排出されるカード</h3>
		<ul class="pack-detail-modal__cards">
			<li th:each="line : ${evilThreatPackPreview}"
			    class="pack-detail-modal__card-row"
			    th:classappend="${'pack-detail-modal__card-row--' + line.rarityCode}">
				<span class="pack-detail-modal__card-name" th:text="${line.name}">名前</span>
				<span class="pack-detail-modal__card-rarity" th:text="${line.rarityLabel}">コモン</span>
			</li>
		</ul>
	</div>
</div>

<script th:src="@{/js/pack-buy.js}"></script>
</body>
</html>
