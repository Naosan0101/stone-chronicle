# Render Blueprint: Web + PostgreSQL
# https://render.com/docs/infrastructure-as-code
#
# 使い方: リポジトリを GitHub/GitLab に push し、Render で Blueprint を接続する。
# デプロイ完了後、ダッシュボードに表示される URL（例: https://nine-universe.onrender.com）でアクセスできる。

services:
  - type: web
    name: nine-universe
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nine-universe-db
          property: connectionString

databases:
  - name: nine-universe-db
    plan: free
